<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Heroes</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Superheroes</h1>

  <!-- SEARCH -->
  <input type="text" id="search" placeholder="Search hero">

  <!-- PAGE SIZE -->
  <select id="pageSize">
    <option value="10">10</option>
    <option value="20" selected>20</option>
    <option value="50">50</option>
    <option value="100">100</option>
    <option value="all">All</option>
  </select>

  <!-- TABLE -->
  <div class="table-container">

    <table>

      <thead>
        <tr>
            <th>Image</th>
          <th data-sort="name">Name</th>
          <th data-sort="fullName">Full Name</th>
          <th data-sort="intelligence">Intelligence</th>
          <th data-sort="strength">Strength</th>
          <th data-sort="speed">Speed</th>
          <th data-sort="race">Race</th>
          <th data-sort="gender">Gender</th>
          <th data-sort="height">Height</th>
          <th data-sort="weight">Weight</th>
          <th data-sort="place">Place</th>
          <th data-sort="alignment">Alignment</th>
        </tr>
      </thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

  <!-- PAGINATION -->
  <div class="pagination">

    <button id="prev">Prev</button>

    <span id="page">1</span>

    <button id="next">Next</button>

   </div>

  <script src="data.js"></script>
  <script src="display.js"></script>
  <script src="search.js"></script>
  <script src="pagination.js"></script>
  <script src="sort.js"></script>
  <script src="script.js"></script>

</body>
</html>
